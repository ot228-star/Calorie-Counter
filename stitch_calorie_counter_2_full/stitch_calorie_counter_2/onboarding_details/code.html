<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mindful Guardian - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#dae2fc",
                        "on-secondary": "#003824",
                        "error": "#ffb4ab",
                        "on-primary-fixed": "#002113",
                        "error-container": "#93000a",
                        "on-primary": "#003824",
                        "surface-container-highest": "#2d3448",
                        "surface-container": "#171f32",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-container": "#00b1c8",
                        "primary-fixed": "#6ffbbd",
                        "surface-variant": "#2d3448",
                        "secondary-fixed": "#6ffbbd",
                        "surface-bright": "#31394d",
                        "on-tertiary-container": "#003e47",
                        "surface-dim": "#0b1325",
                        "on-tertiary-fixed-variant": "#004e59",
                        "tertiary-fixed-dim": "#44d8f1",
                        "on-background": "#dae2fc",
                        "surface": "#0b1325",
                        "on-primary-fixed-variant": "#005236",
                        "on-surface": "#dae2fc",
                        "inverse-on-surface": "#283044",
                        "on-tertiary": "#00363e",
                        "outline-variant": "#3c4a42",
                        "tertiary-fixed": "#a1efff",
                        "on-primary-container": "#00402a",
                        "primary": "#4edea2",
                        "surface-tint": "#4edea2",
                        "tertiary": "#44d8f1",
                        "on-error": "#690005",
                        "on-error-container": "#ffdad6",
                        "surface-container-low": "#131b2e",
                        "inverse-primary": "#006c49",
                        "on-secondary-container": "#003e28",
                        "secondary": "#4edea3",
                        "primary-fixed-dim": "#4edea2",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-fixed": "#002113",
                        "background": "#0b1325",
                        "on-tertiary-fixed": "#001f25",
                        "secondary-container": "#00b47c",
                        "primary-container": "#08b77f",
                        "outline": "#86948a",
                        "surface-container-high": "#222a3d",
                        "surface-container-lowest": "#060e20",
                        "on-surface-variant": "#bbcabf"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #0b1325;
            color: #dae2fc;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .tonal-glass {
            background: rgba(49, 57, 77, 0.6);
            backdrop-filter: blur(24px);
        }
        input::placeholder {
            color: #86948a;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Hero Aesthetic Section -->
<div class="relative w-full h-[221px] overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-background z-10"></div>
<img alt="" class="w-full h-full object-cover opacity-40" data-alt="misty forest at night with moonlight filtering through deep emerald foliage and soft teal shadows" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgY_E8_VzUFBUr3eb0HkWi7hN-RT776QV0qFO7-AspIzPVyvz31XEmBQZvKqvw31WOi43Vq-q_JjdT_5t04c8a16jtAHrjvh0qn8ySzUYFBwVPFNt2UPMX8N7SXaARSvSSAL9fO08fA2yi1VlTpr_EWXgSORiGmjWfv9kBAdn_OkPD3UxA91MWDsknr1y7OASUpytfEEmlNhLoTbmHcIouCYc-O1nARvmlRL5F4hDJyBtaOY4tzsUSDvvouzSc9KbrbC8ESAnn2cY"/>
</div>
<main class="relative z-20 w-full max-w-lg px-6 -mt-20 mb-32">
<div class="text-center mb-10">
<h1 class="text-display-lg font-extrabold text-on-surface tracking-tight leading-tight">
                A few more details
            </h1>
<p class="text-on-surface-variant mt-3 font-medium">
                To build your personal sanctuary, we need to understand your biology.
            </p>
</div>
<!-- Biometrics Bento Layout -->
<div class="space-y-6">
<div class="grid grid-cols-2 gap-4">
<!-- Age Input -->
<div class="bg-surface-container-low p-5 rounded-lg flex flex-col justify-between h-32 transition-all duration-300 hover:bg-surface-container">
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Age</span>
<input class="bg-transparent border-none p-0 text-3xl font-bold focus:ring-0 text-primary placeholder-outline-variant font-body tabular-nums" placeholder="Age" type="number"/>
</div>
<!-- Sex Toggle -->
<div class="bg-surface-container-low p-5 rounded-lg flex flex-col justify-between h-32 transition-all duration-300 hover:bg-surface-container">
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Sex</span>
<div class="flex bg-surface-container-highest p-1 rounded-full w-full">
<button class="flex-1 py-2 text-sm font-bold rounded-full bg-primary text-on-primary shadow-lg">Man</button>
<button class="flex-1 py-2 text-sm font-bold rounded-full text-on-surface-variant">Woman</button>
</div>
</div>
</div>
<!-- Height & Weight -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container p-5 rounded-lg h-32 flex flex-col justify-between shadow-lg">
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Height cm</span>
<input class="bg-transparent border-none p-0 text-3xl font-bold focus:ring-0 text-primary-fixed-dim placeholder-outline-variant tabular-nums" placeholder="Height cm" type="number"/>
</div>
<div class="bg-surface-container p-5 rounded-lg h-32 flex flex-col justify-between shadow-lg">
<span class="text-on-surface-variant text-xs font-bold tracking-widest uppercase">Weight kg</span>
<input class="bg-transparent border-none p-0 text-3xl font-bold focus:ring-0 text-primary-fixed-dim placeholder-outline-variant tabular-nums" placeholder="Weight kg" type="number"/>
</div>
</div>
<!-- Goals Selection -->
<div class="bg-surface-container-low p-6 rounded-lg">
<span class="block text-on-surface-variant text-xs font-bold tracking-widest uppercase mb-4">Your Intent</span>
<div class="grid grid-cols-3 gap-3">
<button class="py-3 px-2 rounded-xl bg-surface-container-highest text-on-surface font-bold text-sm border-2 border-transparent transition-all hover:border-primary/30">lose</button>
<button class="py-3 px-2 rounded-xl bg-primary/20 text-primary font-bold text-sm border-2 border-primary transition-all">maintain</button>
<button class="py-3 px-2 rounded-xl bg-surface-container-highest text-on-surface font-bold text-sm border-2 border-transparent transition-all hover:border-primary/30">gain</button>
</div>
</div>
<!-- Suggestion Engine -->
<div class="flex flex-col items-center pt-4">
<button class="group flex items-center gap-2 py-4 px-10 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold shadow-xl active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
                    Suggest target
                </button>
</div>
<!-- Target Display -->
<div class="bg-surface-container-high border border-outline-variant/10 rounded-xl p-8 mt-4 text-center shadow-2xl relative overflow-hidden">
<div class="absolute -right-10 -top-10 w-40 h-40 bg-primary/5 rounded-full blur-3xl"></div>
<span class="text-on-surface-variant font-bold text-xs tracking-widest uppercase block mb-2">Daily calorie target</span>
<div class="text-6xl font-black text-on-surface font-headline tracking-tighter tabular-nums">
                    2,450
                </div>
<span class="text-primary font-semibold text-sm">kcal / day</span>
</div>
<!-- Theme Selector -->
<div class="pt-6 pb-2">
<span class="block text-center text-on-surface-variant text-xs font-bold tracking-widest uppercase mb-6">Color theme selector</span>
<div class="flex justify-between items-center px-4">
<button class="w-10 h-10 rounded-full bg-blue-500 border-4 border-surface-container-high ring-2 ring-transparent hover:ring-blue-500/50 transition-all"></button>
<button class="w-12 h-12 rounded-full bg-primary border-4 border-on-surface ring-4 ring-primary/20 transition-all shadow-xl"></button>
<button class="w-10 h-10 rounded-full bg-violet-500 border-4 border-surface-container-high hover:ring-2 hover:ring-violet-500/50 transition-all"></button>
<button class="w-10 h-10 rounded-full bg-rose-500 border-4 border-surface-container-high hover:ring-2 hover:ring-rose-500/50 transition-all"></button>
<button class="w-10 h-10 rounded-full bg-orange-500 border-4 border-surface-container-high hover:ring-2 hover:ring-orange-500/50 transition-all"></button>
</div>
<div class="flex justify-between px-4 mt-2">
<span class="text-[10px] text-on-surface-variant font-bold uppercase w-10 text-center">Blue</span>
<span class="text-[10px] text-primary font-bold uppercase w-12 text-center">Emerald</span>
<span class="text-[10px] text-on-surface-variant font-bold uppercase w-10 text-center">Violet</span>
<span class="text-[10px] text-on-surface-variant font-bold uppercase w-10 text-center">Rose</span>
<span class="text-[10px] text-on-surface-variant font-bold uppercase w-10 text-center">Orange</span>
</div>
</div>
</div>
</main>
<!-- Onboarding Footer -->
<footer class="fixed bottom-0 left-0 w-full p-8 tonal-glass z-50 flex items-center justify-between rounded-t-lg">
<button class="text-on-surface-variant font-bold text-sm px-6 py-3 rounded-full hover:bg-surface-container transition-colors">
            Back
        </button>
<button class="bg-surface-bright text-primary font-bold text-sm px-8 py-3 rounded-full shadow-lg active:scale-95 transition-all">
            Finish onboarding
        </button>
</footer>
<!-- Decorative ambient lights -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0 overflow-hidden">
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-tertiary/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
